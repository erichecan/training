<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>袋中球童 · Yardage Caddie</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1E5631">
<style>
  :root{--paper:#F4F0E4;--paper-2:#EBE6D6;--ink:#1C2A1F;--ink-soft:#4A5A4C;--rule:#C9C0A6;
    --green:#1E5631;--green-2:#2E7D46;--flag:#C0392B;--flag-soft:#E07A5F;--wind:#3C7A8C;--shadow:rgba(28,42,31,.12);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--paper);}
  body{font-family:"Hanken Grotesk","PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--ink);
    max-width:560px;margin:0 auto;padding:0 0 80px;min-height:100vh;
    background-image:linear-gradient(var(--paper-2) 1px,transparent 1px);background-size:100% 30px;}
  .wrap{padding:0 18px;}
  header{background:var(--green);color:var(--paper);padding:16px 18px 14px;border-bottom:3px solid var(--ink);position:relative;overflow:hidden;}
  header::after{content:"⛳";position:absolute;right:-6px;bottom:-14px;font-size:84px;opacity:.13;transform:rotate(-12deg);}
  .kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;opacity:.8;font-weight:600;}
  header h1{font-family:"Fraunces",serif;font-weight:600;font-size:25px;line-height:1;margin-top:5px;}
  .tabbar{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;display:flex;background:var(--ink);border-top:2px solid var(--green-2);z-index:50;}
  .tabbar button{flex:1;background:none;border:none;color:var(--paper);opacity:.55;font-family:inherit;font-size:13px;font-weight:600;padding:11px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .tabbar button .ic{font-size:18px;} .tabbar button.on{opacity:1;}
  .view{display:none;} .view.on{display:block;}
  section.card{background:var(--paper);border:1.5px solid var(--ink);border-radius:4px;margin-top:16px;box-shadow:4px 4px 0 var(--shadow);}
  .card-body{padding:15px;} .card-head{padding:12px 15px;border-bottom:1.5px dashed var(--rule);}
  .card-head h2{font-family:"Fraunces",serif;font-size:17px;font-weight:600;}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  input,select{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--paper);border:1.5px solid var(--rule);border-radius:4px;padding:10px 11px;outline:none;}
  input:focus,select:focus{border-color:var(--green-2);}
  .field{margin-bottom:13px;}.row{display:flex;gap:10px;}.row>div{flex:1;}
  .small{font-size:11.5px;color:var(--ink-soft);line-height:1.5;}
  button.primary{width:100%;font-family:"Fraunces",serif;font-weight:600;font-size:17px;background:var(--flag);color:var(--paper);border:1.5px solid var(--ink);padding:13px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:transform .1s,box-shadow .1s;border-radius:4px;}
  button.primary:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
  button.ghost{background:var(--paper);color:var(--green);border:1.5px solid var(--green);padding:9px 13px;font-size:13px;font-weight:700;border-radius:4px;cursor:pointer;font-family:inherit;}
  button.ghost.full{width:100%;}
  .bag-grid{display:grid;grid-template-columns:1fr 78px 78px 28px;gap:8px 9px;align-items:center;}
  .bag-grid .h{font-size:9.5px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);text-align:center;}
  .bag-grid .h:first-child{text-align:left;}.bag-grid input{padding:8px;font-size:15px;text-align:center;}
  .bag-grid .clubname{text-align:left;font-weight:600;font-size:14px;}
  .del{background:none;border:none;color:var(--flag);font-size:18px;cursor:pointer;padding:4px;}
  .add-club{margin-top:11px;display:grid;grid-template-columns:1fr 78px 78px auto;gap:9px;}
  .add-club input{padding:8px;font-size:14px;text-align:center;}.add-club input:first-child{text-align:left;}
  .import-box{border:2px dashed var(--rule);border-radius:6px;padding:24px 16px;text-align:center;}
  .import-box .big{font-size:38px;}.import-box h3{font-family:"Fraunces";font-size:18px;margin:8px 0 4px;}
  .scan-btn{display:inline-block;margin-top:13px;background:var(--green);color:var(--paper);border:1.5px solid var(--ink);padding:12px 22px;border-radius:4px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);}
  .scan-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
  .sc-table{width:100%;border-collapse:collapse;margin-top:6px;}
  .sc-table th{font-size:10px;text-transform:uppercase;color:var(--ink-soft);padding:6px 4px;border-bottom:1.5px solid var(--ink);}
  .sc-table td{padding:3px;border-bottom:1px solid var(--rule);}
  .sc-table td input{padding:6px 4px;font-size:14px;text-align:center;border-color:transparent;background:transparent;}
  .sc-table td input:focus{border-color:var(--green-2);background:var(--paper);}
  .sc-table .hno{font-weight:700;font-family:"Fraunces";text-align:center;font-size:14px;}
  .holenav{display:flex;gap:5px;overflow-x:auto;padding:6px 0 10px;margin-top:6px;}
  .holenav button{flex:none;width:32px;height:32px;border-radius:50%;border:1.5px solid var(--rule);background:var(--paper);font-weight:700;font-size:13px;font-family:"Fraunces";cursor:pointer;color:var(--ink-soft);position:relative;}
  .holenav button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .holenav button .dot{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--flag);}
  .holecard{background:var(--paper);border:2px solid var(--ink);border-radius:5px;box-shadow:5px 5px 0 var(--shadow);overflow:hidden;animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .hc-top{background:var(--ink);color:var(--paper);padding:13px 15px;display:flex;align-items:baseline;justify-content:space-between;}
  .hc-top .hole{font-family:"Fraunces",serif;font-size:14px;}.hc-top .hole b{font-size:24px;}
  .hc-top .meta{font-size:12px;text-align:right;opacity:.9;line-height:1.5;}
  .hc-top .meta .sc{font-family:"Fraunces";font-size:18px;}
  .hc-ctrl{padding:10px 15px;background:var(--paper-2);border-bottom:1.5px solid var(--rule);display:flex;flex-wrap:wrap;gap:14px;}
  .ctrl-grp{display:flex;flex-direction:column;gap:5px;}.ctrl-grp .lab{font-size:9.5px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);}
  .ctrl-grp .pills{display:flex;gap:5px;}
  .mini{border:1.5px solid var(--rule);background:var(--paper);border-radius:3px;padding:5px 9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);}
  .mini.on{background:var(--green);color:var(--paper);border-color:var(--green);}.mini.wind.on{background:var(--wind);border-color:var(--wind);}
  .hc-body{padding:4px 15px 14px;}
  .section-label{display:flex;align-items:center;gap:9px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 6px;}
  .section-label::before,.section-label::after{content:"";flex:1;height:1.5px;background:var(--rule);}
  .section-label.plan{color:var(--green-2);}.section-label.act{color:var(--flag);}
  .shot{padding:11px 0;border-bottom:1.5px dashed var(--rule);}.shot:last-child{border-bottom:none;}
  .shot-head{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
  .shot-no{width:24px;height:24px;flex:none;border-radius:50%;background:var(--green);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:"Fraunces";}
  .shot-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);}
  .shot-club{font-family:"Fraunces",serif;font-size:21px;font-weight:600;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}
  .shot-club .yd{font-size:13px;font-family:"Hanken Grotesk";color:var(--green-2);font-weight:700;}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:3px;}
  .tag.warn{background:var(--flag-soft);color:#5c1d12;}.tag.safe{background:#cfe3d2;color:var(--green);}.tag.wind{background:#bcd9e0;color:#16454f;}
  .shot-detail{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.5;padding-left:33px;}
  .shot-detail b{color:var(--ink);}
  .notes{background:var(--paper-2);border-top:1.5px solid var(--rule);padding:11px 15px;margin:10px -15px 0;}
  .notes h3{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  .notes li{font-size:12.5px;line-height:1.5;margin-left:16px;margin-bottom:4px;}.notes li::marker{color:var(--flag);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{border:1.5px solid var(--rule);background:var(--paper);border-radius:13px;padding:5px 10px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);}
  .chip.on{background:var(--green);color:var(--paper);border-color:var(--green);}
  .chip.bad.on{background:var(--flag);border-color:var(--flag);}.chip.pen.on{background:#7a1f15;border-color:#7a1f15;color:var(--paper);}
  .chip.dir.on{background:var(--wind);border-color:var(--wind);color:var(--paper);}
  .shotrow{border:1.5px solid var(--rule);border-radius:5px;padding:9px 10px;margin-bottom:8px;background:var(--paper);}
  .shotrow .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .shotrow .sn{font-family:"Fraunces";font-weight:700;font-size:13px;color:var(--ink-soft);}
  .rowlab{font-size:9.5px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);margin:7px 0 4px;}
  .stepper{display:flex;align-items:center;border:1.5px solid var(--rule);border-radius:5px;overflow:hidden;width:max-content;}
  .stepper button{border:none;background:var(--paper-2);width:36px;height:34px;font-size:19px;cursor:pointer;color:var(--ink);}
  .stepper span{min-width:40px;text-align:center;font-weight:700;font-size:15px;}
  .badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;background:var(--paper-2);color:var(--ink-soft);}
  .badge.hit{background:#cfe3d2;color:var(--green);}.badge.miss{background:var(--flag-soft);color:#5c1d12;}
  .ydinput{width:72px;padding:7px;font-size:14px;text-align:center;}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .statbox{border:1.5px solid var(--rule);border-radius:5px;padding:10px 12px;}
  .statbox .v{font-family:"Fraunces";font-size:21px;font-weight:700;line-height:1.1;}
  .statbox .l{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;margin-top:3px;}
  .disp{border:1.5px solid var(--rule);border-radius:5px;padding:10px 12px;margin-bottom:9px;}
  .disp .ch{font-family:"Fraunces";font-weight:700;font-size:15px;}
  .bar{height:9px;border-radius:5px;background:var(--paper-2);position:relative;margin:8px 0 4px;overflow:hidden;}
  .bar .mid{position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--ink-soft);}
  .bar .fill{position:absolute;top:0;bottom:0;background:var(--wind);opacity:.8;}
  .empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 10px;}
  .navbtns{display:flex;gap:10px;margin-top:12px;}.navbtns button{flex:1;}
  .footnote{font-size:11px;color:var(--ink-soft);text-align:center;margin:18px 0 4px;line-height:1.6;}
  .saved{font-size:11px;color:var(--green-2);font-weight:700;opacity:0;transition:opacity .3s;}.saved.show{opacity:1;}
  .overlay{position:fixed;inset:0;background:rgba(28,42,31,.55);display:none;align-items:center;justify-content:center;z-index:99;}
  .overlay.on{display:flex;}
  .spinner{background:var(--paper);border:2px solid var(--ink);border-radius:6px;padding:24px 30px;text-align:center;box-shadow:5px 5px 0 var(--shadow);}
  .spinner .dot{width:32px;height:32px;border:4px solid var(--rule);border-top-color:var(--green);border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* ---- play mode: full-screen, no page scroll ---- */
  body.play-mode{padding:0!important;height:100dvh;overflow:hidden;background-image:none;}
  body.play-mode .tabbar,body.play-mode header{display:none!important;}
  body.play-mode #playView{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
  body.play-mode #playWrap{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0;}
  .pm-header{display:flex;align-items:center;gap:10px;padding:10px 15px;flex:none;background:var(--ink);color:var(--paper);}
  .pm-back{background:none;border:1.5px solid rgba(255,255,255,.35);border-radius:4px;color:rgba(255,255,255,.85);font-size:12px;font-weight:700;padding:5px 10px;cursor:pointer;font-family:inherit;}
  .pm-title{font-family:"Fraunces",serif;font-size:17px;font-weight:700;flex:1;color:var(--paper);}
  .pm-prog{font-size:12px;color:rgba(255,255,255,.65);font-weight:700;}
  .pm-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .pm-holecard{margin:12px 14px 4px;border:2px solid var(--ink);border-radius:5px;box-shadow:4px 4px 0 var(--shadow);overflow:hidden;background:var(--paper);}
  .pm-nav{flex:none;display:flex;background:var(--ink);border-top:2px solid var(--green-2);}
  .pm-nav button{flex:1;background:none;border:none;color:var(--paper);font-family:"Fraunces",serif;font-size:15px;font-weight:600;padding:13px;cursor:pointer;}
  .pm-nav button:disabled{opacity:.3;cursor:default;}
  .pm-nav .pm-dot{color:var(--paper);font-size:12px;font-weight:700;padding:0 14px;display:flex;align-items:center;opacity:.65;white-space:nowrap;}
  /* ---- compact hole card (play mode only) ---- */
  .pm-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:6px 13px;background:var(--paper-2);border-bottom:1px solid var(--rule);font-size:11px;font-weight:700;}
  .pm-meta .mini{padding:3px 7px;font-size:11px;}
  .pm-meta .sep{color:var(--rule);margin:0 2px;}
  .pm-plan-bar{padding:5px 13px;border-bottom:1px dashed var(--rule);font-size:11.5px;color:var(--ink-soft);line-height:1.6;}
  .pm-plan-bar b{color:var(--green-2);}
  .pm-prev{display:flex;align-items:center;gap:8px;padding:5px 13px;border-bottom:1px dashed var(--rule);}
  .pm-prev .sn{width:19px;height:19px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:"Fraunces";flex:none;}
  .pm-prev .pi{flex:1;font-size:12px;color:var(--ink-soft);}
  .pm-cur{padding:7px 13px 4px;}
  .pm-cur-title{font-family:"Fraunces";font-weight:700;font-size:13px;color:var(--ink-soft);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .pm-hchips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
  .pm-hchips .chip{padding:4px 9px;font-size:12px;}
  /* plan section */
  .pm-plan{border-bottom:1px solid var(--rule);}
  .pm-plan-hd{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green-2);padding:5px 13px 2px;}
  .pm-pshot{display:flex;align-items:flex-start;gap:7px;padding:4px 13px;}
  .pm-psn{width:18px;height:18px;border-radius:50%;background:var(--green);color:var(--paper);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:"Fraunces";flex:none;margin-top:1px;}
  .pm-pinfo{flex:1;min-width:0;}
  .pm-pclub{font-family:"Fraunces";font-weight:700;font-size:13px;}
  .pm-pyd{font-size:11px;color:var(--green-2);font-weight:700;margin-left:4px;}
  .pm-pdet{font-size:11px;color:var(--ink-soft);line-height:1.4;margin-top:1px;}
  .pm-notes{padding:3px 13px 6px;display:flex;flex-wrap:wrap;gap:4px;}
  .htype{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:2px;}
  .htype.score{background:rgba(46,125,70,.85);color:#fff;}
  .htype.save{background:rgba(192,57,43,.85);color:#fff;}
  .htype.neutral{background:var(--rule);color:var(--ink);}
  .pm-tac{margin:7px 13px 0;padding:6px 10px;border-radius:5px;font-size:12.5px;border-left:3px solid var(--rule);background:var(--paper-2);}
  .pm-tac.score{border-color:#2e7d46;background:rgba(46,125,70,.1);}
  .pm-tac.save{border-color:#c0392b;background:rgba(192,57,43,.09);}
  .pm-tac.neutral{border-color:var(--rule);}
  .cm{margin:8px 13px 4px;border:1px solid var(--rule);border-radius:7px;background:var(--paper-2);overflow:hidden;}
  .cm>summary{cursor:pointer;font-size:12.5px;font-weight:700;padding:8px 11px;color:var(--green-2);list-style:none;}
  .cm>summary::-webkit-details-marker{display:none;}
  .cm-bd{padding:4px 11px 10px;}
  .cm-bad{background:rgba(192,57,43,.08);border-left:3px solid #c0392b;border-radius:5px;padding:7px 9px;font-weight:700;font-size:13px;margin-bottom:8px;}
  .cm-ez{font-weight:400;font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
  .cm-mh{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;margin:2px 0 5px;}
  .cm-m{font-size:13px;padding:3px 0;color:var(--ink);}
  .pm-note{font-size:10.5px;color:var(--ink-soft);background:var(--paper-2);border-radius:3px;padding:2px 6px;}
  .pm-rl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);margin:4px 0 3px;letter-spacing:.06em;}
  .pm-dist{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .pm-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;border-top:1.5px solid var(--rule);background:var(--paper);flex:none;}
  .pm-slab{font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;margin-right:6px;}
  .pm-footer .stepper button{width:30px;height:28px;font-size:16px;}
  .pm-footer .stepper span{min-width:28px;font-size:13px;}
  .pm-next{background:var(--green);color:var(--paper);border:none;border-radius:4px;font-family:"Fraunces";font-weight:700;font-size:14px;padding:8px 15px;cursor:pointer;}
  .pm-badges{display:flex;gap:5px;flex-wrap:wrap;padding:4px 13px 8px;}
  /* ---- hole class (得分/优势/困难) shared ---- */
  .klass{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.04em;}
  .klass.score{background:rgba(200,151,58,.18);color:#8a6310;}
  .klass.adv{background:#cfe3d2;color:var(--green);}
  .klass.hard{background:var(--flag-soft);color:#5c1d12;}
  /* ---- game plan panel ---- */
  .gp-summary{font-size:13px;line-height:1.55;color:var(--ink-soft);margin-bottom:10px;}
  .gp-path{background:var(--ink);color:var(--paper);border-radius:5px;padding:11px 13px;margin-bottom:12px;}
  .gp-path .pr{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;opacity:.9;}
  .gp-path .pr .eq{margin-left:auto;font-weight:700;color:var(--flag-soft);font-family:"Fraunces";white-space:nowrap;}
  .gp-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;}
  .gp-chip{flex:none;border-radius:5px;padding:5px 8px;text-align:center;min-width:48px;border:1.5px solid var(--rule);}
  .gp-chip.score{background:rgba(200,151,58,.14);border-color:rgba(200,151,58,.4);}
  .gp-chip.adv{background:rgba(46,125,70,.12);border-color:rgba(46,125,70,.4);}
  .gp-chip.hard{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.35);}
  .gp-chip .n{font-family:"Fraunces";font-weight:700;font-size:14px;}
  .gp-chip .y{font-size:9px;color:var(--ink-soft);}
  .gp-chip .k{font-size:9px;font-weight:700;}
  .gp-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;}

<script>
/* ===== portable storage (Claude artifact OR self-hosted PWA) ===== */
const SYNC_KEYS=["golf:rounds","golf:curRound","golf:bag2","golf:course2","golf:trainPrefs","golf:checkins","golf:courses","golf:qeDraft"];
function syncStateMap(){try{return JSON.parse(localStorage.getItem("_syncState")||"{}");}catch(e){return {};}}
function setSyncState(k,s){const m=syncStateMap();m[k]=s;try{localStorage.setItem("_syncState",JSON.stringify(m));}catch(e){}}
const store={
  async get(k){ try{ const r=await fetch("/api/kv/"+encodeURIComponent(k)); const j=await r.json();
    if(j&&j.value!=null){ try{localStorage.setItem(k,j.value);}catch(e){} return j; }
    const v=localStorage.getItem(k); return v==null?null:{value:v}; }
    catch(e){ const v=localStorage.getItem(k); return v==null?null:{value:v}; } },
  async set(k,v){ try{ localStorage.setItem(k,v); }catch(e){}
    try{ const r=await fetch("/api/kv/"+encodeURIComponent(k),{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify({value:v})});
      if(!r.ok) throw new Error("HTTP "+r.status); setSyncState(k,"cloud"); }
    catch(e){ setSyncState(k,"local"); } }
};
async function syncAllToCloud(){
  let ok=0,fail=0;const detail=[];
  for(const k of SYNC_KEYS){const v=localStorage.getItem(k);if(v==null)continue;
    try{ const r=await fetch("/api/kv/"+encodeURIComponent(k),{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify({value:v})});
      if(!r.ok) throw new Error("HTTP "+r.status); setSyncState(k,"cloud"); ok++; }
    catch(e){ setSyncState(k,"local"); fail++; detail.push(k+": "+(e.message||"失败")); } }
  try{renderBackupBox();}catch(e){}
  alert(fail? `同步完成:成功 ${ok} 项,失败 ${fail} 项\n${detail.join("\n")}\n(失败多半是网络问题,联网后再点一次)` : `✅ 全部 ${ok} 项已同步到云端,换设备也不会丢了。`);
}
function exportData(){
  const dump={_exportedAt:new Date().toISOString()};
  SYNC_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!=null)dump[k]=v;});
  const json=JSON.stringify(dump,null,2);
  try{ const blob=new Blob([json],{type:"application/json"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="caddie-backup-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500); }catch(e){}
  const box=document.getElementById("exportBox");
  if(box){ box.value=json; box.style.display="block"; box.focus(); box.select(); }
}
function backupPanel(){
  const m=syncStateMap();
  const present=SYNC_KEYS.filter(k=>localStorage.getItem(k)!=null);
  const pend=present.filter(k=>m[k]!=="cloud");
  const badge=present.length===0? `<span style="color:var(--ink-soft);">本设备暂无数据</span>`
    : pend.length? `<span style="color:var(--flag);font-weight:700;">⚠️ ${pend.length} 项仅存在本设备</span>`
    : `<span style="color:var(--green);font-weight:700;">✅ 已同步云端</span>`;
  return `<section class="card"><div class="card-head"><h2>📦 数据备份 / 同步</h2></div><div class="card-body">
    <p class="small" style="margin-bottom:9px;">${badge} · 数据默认只存你这台设备,点同步可上云,换设备/清缓存才不会丢。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="ghost full" onclick="syncAllToCloud()">☁️ 一键同步到云端</button>
      <button class="ghost full" onclick="exportData()">⬇️ 导出备份</button>
    </div>
    <textarea id="exportBox" readonly placeholder="导出的数据会显示在这里,长按全选复制" style="display:none;width:100%;height:120px;margin-top:9px;font-size:11px;font-family:monospace;border:1.5px solid var(--rule);border-radius:4px;padding:6px;background:var(--paper);color:var(--ink);" onclick="this.select()"></textarea>
  </div></section>`;
}

 {name:"Driver",total:220,carry:195},{name:"3W",total:200,carry:182},{name:"5W",total:185,carry:170},

 {k:"fringe",t:"果岭边缘",g:"meh"},{k:"grough",t:"果岭边长草",g:"meh"},{k:"green",t:"果岭",g:"good"},{k:"gbunker",t:"果岭沙坑",g:"bad"},

/* ===== check-in helpers ===== */
async function saveCheckins(){await store.set("golf:checkins",JSON.stringify(checkins));}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function streakCount(){
  if(!checkins.length)return 0;
  const days=new Set(checkins.map(c=>c.date));
  let n=0;const d=new Date();
  if(!days.has(todayStr()))d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    const s=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(days.has(s)){n++;d.setDate(d.getDate()-1);}else break;
  }
  return n;
}
function computeBadges(){
  const streak=streakCount();
  const pressN=checkins.filter(c=>c.tasks&&c.tasks.includes("pressure")).length;
  const allR=[...rounds];if(R)allR.push(R);
  const pn=allR.flatMap(rd=>rd.holes.filter(h=>h.shots.length>0)).length;
  const now=Date.now();
  const month30=checkins.filter(c=>c.ts&&(now-c.ts)<30*86400000).length;
  return [

function courseAgg(name){
  const list=rounds.filter(rd=>(rd.courseName||"")===name);
  if(R&&(R.courseName||"")===name&&R.holes.some(h=>holeStats(h).played))list.push(R);
  let totScore=0,totPar=0,n=0;const hd={};
  list.forEach(rd=>{let played=false;
    rd.holes.forEach(h=>{const st=holeStats(h);if(!st.played)return;played=true;totScore+=st.score;totPar+=h.par;
      const e=hd[h.no]||(hd[h.no]=[0,0]);e[0]+=st.score-h.par;e[1]++;});
    if(played)n++;});
  if(!n)return{n:0};
  let weak=null,wd=-Infinity;Object.keys(hd).forEach(no=>{const a=hd[no][0]/hd[no][1];if(a>wd){wd=a;weak={no:+no,avg:a};}});
  return{n,avgScore:Math.round(totScore/n),avgVsPar:Math.round((totScore-totPar)/n),weak};
}

  buf.name=nm;buf.holes.forEach(h=>{h.par=+h.par||4;});

  saveCoursesLib();
  if(oldName!==nm){ // 改名:迁移历史轮次,否则成绩会与球场断链
    let migrated=false;
    rounds.forEach(rd=>{if((rd.courseName||"")===oldName){rd.courseName=nm;rd.courseKey=nm+"|"+(rd.tee||"");migrated=true;}});
    if(migrated)saveRounds();
    if(R&&(R.courseName||"")===oldName){R.courseName=nm;R.courseKey=nm+"|"+(R.tee||"");saveCur();}
  }
  if(S.course&&S.course.name===oldName){

    S.course=JSON.parse(JSON.stringify({name:nc.name,tees:nc.tees,holes:nc.holes,rating:nc.rating,slope:nc.slope,target:nc.target}));

}

/* ===== STRATEGY ENGINE ===== */
const PIN_OFF={front:-6,mid:0,back:6}, FIRM_ROLL={soft:-3,medium:0,firm:5};
function sb(){return [...bag].filter(c=>c.total>0).sort((a,b)=>b.total-a.total);}
function nearestTotal(b,t){let best=b[0],g=Infinity;for(const c of b){const d=Math.abs(c.total-t);if(d<g){g=d;best=c;}}return best;}
/* 风向归一化:统一成数组。兼容旧的字符串存档("into"/"down"/"cross"/"none")。 */
function windTypes(w){return Array.isArray(w)?w.filter(x=>x&&x!=="none"):(w&&w!=="none"?[w]:[]);}
/* 风速对距离的修正(码)。Trackman:7号铁166码carry,逆风10mph −17码(~1.0%/mph)、顺风10mph +13码(~0.78%/mph),逆风伤害约为顺风1.3~1.5倍且强风非线性。
   返回正=要按更远打(逆风),负=按更近打(顺风);纯侧风/无风返回0(只影响瞄准)。作用于该段距离 D 的百分比。 */
function windAdj(D,w,mph){
  if(!mph||!D)return 0;const ws=windTypes(w);
  let f=0;
  if(ws.includes("into"))f=0.0102;        // 逆风 ~1.02%/mph
  else if(ws.includes("down"))f=-0.0078;  // 顺风 ~0.78%/mph
  if(!f)return 0;
  let adj=f*mph*D;
  if(f>0&&mph>15)adj*=1+(mph-15)*0.012;   // 强逆风(>15mph)额外加重,体现非线性
  return Math.round(adj);
}
function gapNote(club,t){const g=club.total-t;if(Math.abs(g)<=4)return"满杆";return g>0?`比满杆多约${g}码，收着打`:`比满杆少约${-g}码，可大半号`;}
function isDriver(c){return /driver|一号木|^d$|^1\s*w$/i.test(c.name||"");}
function fairwayOf(b){const f=b.filter(c=>!isDriver(c));return f.length?f:b;}
function approachShot(no,label,b,remaining,pin,firm,wt,mph,allowDriver){
  const pool=allowDriver?b:fairwayOf(b); // 球道上不用一号木,只有发球台开球(par3)才放行
  const eff=remaining+PIN_OFF[pin], plays=eff+windAdj(eff,wt,mph), club=nearestTotal(pool,plays);
  const t=clubTendency(club.name);
  let land=Math.max(club.carry+FIRM_ROLL[firm],0);
  const windTxt=plays!==eff?`，风修正按 <b>${plays}码</b>`:"";
  const gapShort=plays-club.total; // 最长可用杆都够不到
  let detail;
  if(gapShort>12)detail=`本距离 <b>${eff}码</b>${windTxt}。最长能上手的 ${club.name} 也差 <b>${gapShort}码</b>够不到 → 别硬冲,${club.name} 打远或放短,留个顺手距离再攻果岭。`;
  else detail=`本距离 <b>${eff}码</b>${windTxt}。${gapNote(club,plays)}，落点约 <b>${land}码</b>借滚动到旗。`;
  return {no,label,clubName:club.name,clubYd:club.total,detail,reach:gapShort<=12,
    tag:gapShort>12?{t:"warn",x:"够不到·放球道"}:(Math.abs(club.total-plays)<=4?{t:"safe",x:"满杆"}:{t:"warn",x:"非满杆"}),
    wind:plays!==eff?{t:"wind",x:windTypes(wt).includes("into")?"逆风+":"顺风−"}:null};
}
/* 开球选杆:近距离优先 + 风险刹车。
   核心:剩余距离越短分越低(优先尽量开近,符合 Strokes Gained——越近期望杆数越低);
   风险刹车:用历史离散度(spread)作代理,离散大/driver 罚分,数据不足时默认放手用 driver;
   过果岭(remaining<=0)重罚,避免开过头。 */
function pickTee(b,hole,wt,mph){
  let cands=b.filter(c=>c.total>=150);if(!cands.length)cands=[b[0]];
  const minWedge=b[b.length-1].total;
  return cands.map(c=>{
    const eff=c.total-windAdj(c.total,wt,mph),remaining=hole-eff;let score=0;
    if(remaining<=0)score=80+Math.abs(remaining)*5;       // 开过头/贴果岭前,重罚
    else{
      score=remaining*1.0;                                 // 近距离优先(强权重)
      if(remaining<minWedge*0.5)score+=(minWedge*0.5-remaining)*1.5; // 别贴太近,留个切击空间
      const sp=clubTendency(c.name).spread||0;             // 离散度风险代理
      score+=sp*1.2;
      if(isDriver(c))score+=sp*0.8+6;                      // driver 下水/OB 代价高,额外谨慎
    }
    return{club:c,landing:Math.round(eff),remaining:Math.round(remaining),score};
  }).sort((x,y)=>x.score-y.score);}
function computePlan(h,pin,firm,wt,mph){
  const b=sb(),par=h.par,hole=h.yards[S.tee],shots=[],notes=[];
  const pinTxt={front:"前旗",mid:"中旗",back:"后旗"}[pin];
  if(!hole)return{par,hole:null,shots:[],notes:["这洞没码数，去『记分卡数据』补上。"]};
  if(par===3){shots.push(approachShot(1,"开球·攻果岭",b,hole,pin,firm,wt,mph,true));if(pin==="front")notes.push("前旗别冲，落果岭中部更稳。");}
  else{const rank=pickTee(b,hole,wt,mph),best=rank[0],longest=b[0];
    if(best.club.name!==longest.name)notes.push(`收着用 ${best.club.name}（非 ${longest.name}）换准度，进攻距离约 ${best.remaining}码；若球道开阔、你 ${longest.name} 够稳，也可放手开近一点。`);
    else if(isDriver(best.club))notes.push(`放手用 ${best.club.name} 开近，进攻距离压到约 ${best.remaining}码——越近越好上，只要避开水/OB。`);
    if(par===4){const _w=windTypes(wt),_hd=_w.includes("into"),_tw=_w.includes("down");shots.push({no:1,label:"开球",clubName:best.club.name,clubYd:best.club.total,detail:`预计到 <b>${best.landing}码</b>，还剩 <b>${best.remaining>0?best.remaining:0}码</b>。`,wind:mph&&(_hd||_tw)?{t:"wind",x:_hd?"逆风":"顺风"}:null});
      if(best.remaining<=0)notes.push("这杆够得着果岭，无碍可冲，求稳就换短杆放球道。");else shots.push(approachShot(2,"第二杆·攻果岭",b,best.remaining,pin,firm,wt,mph));}
    else{const rem2=Math.round(hole-best.landing);
      shots.push({no:1,label:"开球",clubName:best.club.name,clubYd:best.club.total,detail:`预计到 <b>${best.landing}码</b>，还剩 <b>${rem2}码</b>到果岭。`,wind:null});
      const fw=fairwayOf(b);if(fw[0].total>=rem2&&rem2>0){const go=nearestTotal(fw,rem2);shots.push({no:2,label:"第二杆·可两上",clubName:go.name,clubYd:go.total,detail:`想两上：${go.name} 够 ${rem2}码，风险高就放球道。`,tag:{t:"warn",x:"高风险"},wind:null});
        const wedge=b.filter(c=>c.total<=110).sort((x,y)=>y.total-x.total)[0]||b[b.length-1];const lay=nearestTotal(b,rem2-wedge.total);const r3=Math.max(rem2-lay.total,40);
        shots.push(Object.assign(approachShot(3,"x",b,r3,pin,firm,wt,mph),{label:`或：${lay.name}放球道→第三杆`}));}
      else{const wedge=b.filter(c=>c.total>=85&&c.total<=115).sort((x,y)=>y.total-x.total)[0]||b[b.length-1];const lay=nearestTotal(b,rem2-wedge.total);const r3=Math.max(Math.round(rem2-lay.total),0);
        shots.push({no:2,label:"第二杆·放球道",clubName:lay.name,clubYd:lay.total,detail:`放到剩约 <b>${r3}码</b>，留个顺手攻击距离。`,wind:null});
        shots.push(approachShot(3,"第三杆·攻果岭",b,r3,pin,firm,wt,mph));}}}
  if(mph&&windTypes(wt).includes("cross"))notes.push(`侧风 ${mph}mph：距离基本不变，瞄上风一侧让球飘回。`);
  if(mph>20&&windTypes(wt).includes("into"))notes.push(`强逆风 ${mph}mph：实际损失比常规更狠，宁可多上一两号、打低弹道控距。`);
  if(firm==="firm")notes.push("果岭偏硬，宁可落短半号让球滚上去。");
  // tendency-aware notes
  [...new Set(shots.map(s=>s.clubName))].forEach(cn=>{const tn=tendencyNote(cn,par,pin);if(tn)notes.unshift(tn);});
  // —— 「她自己的 par」:按她实际距离,现实地几杆到果岭 + 2 推(不照记分卡 par,避免为抓官方 par 爆洞) ——
  let stg;
  if(par===3){stg=shots[0]&&shots[0].reach===false?2:1;}
  else if(par===4){const ap=shots.find(s=>s.no>=2&&s.reach!=null);stg=ap?(ap.reach?2:3):1;}
  else{const ap=[...shots].reverse().find(s=>s.reach!=null);stg=ap?(ap.reach?ap.no:ap.no+1):3;}
  const tacticalPar=stg+2;
  const holeType=tacticalPar<=par?"score":"save";
  if(holeType==="save")notes.unshift(`【保命洞 · 你的 par ${tacticalPar}】这距离够不到果岭,别搏,稳稳收 ${tacticalPar}、不爆洞就是赢。`);
  else notes.unshift(`【抓分洞 · 你的 par ${tacticalPar}】你能正常上果岭,稳稳两推保 par,有机会搏鸟。`);
  if(!notes.length)notes.push("按上面距离正常打；失误优先保住下一杆是平地满杆距离。");
  return{par,hole,pinTxt,firm,shots,notes,tacticalPar,holeType};
}

/* 进行中一轮的恢复位置:优先关浏览器前停留的洞(R.curHole),退回最后有记录的洞。 */
function resumeInfo(){

}
function continueRound(){

/* 风向多选:逆/顺互斥(选一个去掉另一个),侧风可与逆/顺叠加;「无」清空。各项可再点一次取消。 */
function setWind(w){

  if(w==="none")arr=[];
  else if(w==="cross")arr=arr.includes("cross")?arr.filter(x=>x!=="cross"):[...arr,"cross"];

    const yd=tr.querySelector(".scYd").value;S.course.holes[i].yards[S.tee]=yd?+yd:null;});

/* ===== ROUND / LOGGING ===== */
function courseKey(){return (S.course.name||"")+"|"+S.tee;}

     holes:S.course.holes.map(h=>({no:h.no,par:h.par,yards:h.yards[S.tee],shots:[],putts:2,note:"",tee:(h.teeGps&&h.teeGps[S.tee])||null}))};saveCur();}
function suggestedClub(i){const p=S.plans[i],n=R.holes[i].shots.length;if(p&&p.shots&&p.shots[n])return p.shots[n].clubName;return"";}
/* 历史真实距离选杆:某距离段有 ≥3 杆样本时,按上果岭率(green+fringe*0.5)优先,并列看次数 */
function pickClubByHistory(rem){
  if(!rem||rem<=0)return null;
  const hist=clubHistoryAt(rem);            // [{club,n,avg,res}], 已按 n 降序
  const enough=hist.filter(h=>h.n>=3);
  if(!enough.length)return null;
  const scored=enough.map(h=>{
    const g=(h.res.green||0)+(h.res.fringe||0)*0.5;
    return {club:h.club, clubYd:h.avg, n:h.n, onN:(h.res.green||0)+(h.res.fringe||0), rate:g/h.n};
  }).sort((a,b)=>b.rate-a.rate||b.n-a.n);
  return scored[0];
}
/* 本轮手感:只看当前 R 里这支杆的击球,≥2 次同向/同偏才报,1 次偶发不报 */
function thisRoundSignal(club){
  if(!R||!club)return null;
  const shots=[];
  (R.holes||[]).forEach(h=>(h.shots||[]).forEach(s=>{if(s.club===club)shots.push(s);}));
  if(shots.length<2)return null;
  const cnt=t=>shots.filter(s=>nd(s.dir).includes(t)).length;
  const left=cnt("left")+cnt("fl"), right=cnt("right")+cnt("fr");
  const shortN=cnt("short"), longN=cnt("long");
  const bits=[];
  if(left>=2&&left>right)bits.push("这支老左曲,瞄右一点");
  else if(right>=2&&right>left)bits.push("这支老右曲,瞄左一点");
  if(longN>=2&&longN>shortN)bits.push("偏长,收半号");
  else if(shortN>=2&&shortN>longN)bits.push("偏短,宁可大半号");
  return bits.length?bits.join(";"):null;
}
/* 打法指引:旗位/果岭软硬/距离边界/球杆离散 → 取舍文案,不依赖历史 */
function playStyleTips(rem,pin,firm,maxTotal,minTotal,spread){
  const t=[];
  if(maxTotal&&rem>maxTotal)t.push("够不到果岭,放到剩 ~90 码留个顺手距离");
  else if(minTotal&&rem<=minTotal)t.push("比最短杆还近,收点力控距,别打过旗");
  if(pin==="front")t.push("前旗别冲,瞄果岭中部,落球后旗更安全");
  else if(pin==="back")t.push("后旗可加半号,但别长");
  if(spread&&spread>=8)t.push("这支飘,打中心别冲边旗");
  if(firm==="firm")t.push("果岭硬,落短半号让球滚上去");
  return t;
}
function liveSuggest(i,j){
  if(j<1||!R||!R.holes[i])return null;
  const sh=R.holes[i].shots,prev=sh[j-1];if(!prev||prev.rem==null||prev.rem<=0)return null;
  const b=sb();if(b.length<1)return null;
  const rem=prev.rem,pin=S.holePin[i]||"mid",firm=S.firm||"medium",wt=S.holeWind[i]||"none",mph=S.windMph;
  const lie=nd(prev.lie);
  // 球位/坡度影响有效选杆距离:长草力量打折→按更远选;上坡变短→加杆;下坡略远;侧坡代偿略收
  let effRem=rem;
  if(prev.result==="rough")effRem=Math.round(effRem*1.12);
  if(lie.includes("uphill"))effRem=Math.round(effRem*1.05);
  else if(lie.includes("downhill"))effRem=Math.round(effRem*0.97);
  if(lie.includes("above")||lie.includes("below"))effRem=Math.round(effRem*1.02);
  // —— 选杆:增强① 历史优先,不足回退标称 ——
  const hp=pickClubByHistory(rem);
  let club,clubYd;const detailLines=[];
  if(hp){
    club=hp.club;clubYd=hp.clubYd;
    detailLines.push(`你这距离 ${club} 打过 ${hp.n} 次,其中 ${hp.onN} 次上果岭(实测均 <b>${clubYd}码</b>)`);
    if(effRem!==rem)detailLines.push(`这球位力量打折,实际按 <b>${effRem}码</b> 选杆,宁可大半号`);
  }else{
    const a=approachShot(j+1,"实时",b,effRem,pin,firm,wt,mph);
    club=a.clubName;clubYd=a.clubYd;detailLines.push(a.detail);
  }
  // —— 增强③ 打法细节(不依赖历史) ——
  const maxTotal=b[0].total,minTotal=b[b.length-1].total,spread=clubTendency(club).spread;
  playStyleTips(rem,pin,firm,maxTotal,minTotal,spread).forEach(t=>detailLines.push(t));
  // —— 修正:球位 → 增强② 本场优先,退历史 ——
  const adv=[];
  const lieMap={rough:"上一杆在长草,力量打折约一成,已按更远选杆;小心 flyer 出球更冲、多滚",trees:"树下,先低弹道打出来回球道,别强求距离",fbunker:"球道沙坑,先稳出来",gbunker:"沙坑,先上果岭",grough:"果岭边长草,切击别加速、挖到球根稳稳上果岭,别想着一杆贴洞",ob:"刚罚杆,这杆求稳",water:"刚罚杆,这杆求稳",fringe:"果岭边缘,可推或切滚"};
  if(lieMap[prev.result])adv.push(lieMap[prev.result]);
  if(lie.includes("uphill"))adv.push("上坡:球会高而短,已按加杆算;球易偏左,瞄右一点");
  if(lie.includes("downhill"))adv.push("下坡:球低难拉高、易打薄,稳住别贪;球易偏右,瞄左一点");
  if(lie.includes("above"))adv.push("球高于脚:球会往左飞,瞄右一点,握短一点收点力");
  if(lie.includes("below"))adv.push("球低于脚:球会往右飞,瞄左一点,屈膝重心稳住别打薄");
  const rt=thisRoundSignal(club);
  if(rt)adv.push("【本场】"+rt);
  else{const tn=tendencyNote(club,R.holes[i].par,pin);if(tn)adv.push("【历史】"+tn.replace(/^📈\s*/,""));}
  const dir=nd(prev.dir);
  if(!rt&&(dir.includes("left")||dir.includes("fl")))adv.push("上杆偏左,瞄右一点");
  if(!rt&&(dir.includes("right")||dir.includes("fr")))adv.push("上杆偏右,瞄左一点");
  return {club:club,clubYd:clubYd,detail:detailLines.join("<br>"),rem:rem,advice:adv.join(";")};
}

/* ===== GPS 打点击球距离(对标 Arccos/Shot Scope:相邻两点直线) ===== */
function ydBetween(a,b){
  if(!a||!b||a.lat==null||b.lat==null)return null;
  const R0=6371000,rad=Math.PI/180;

    p=>cb({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy),t:Date.now()}),
    e=>cb(null,e.message||"无法获取位置"),

function prevPos(i,j){const sh=R.holes[i].shots;return j===0?(R.holes[i].tee||null):((sh[j-1]&&sh[j-1].pos)||null);}
function recalcShotDist(i,j){
  const sh=R.holes[i].shots,p=S.plans[i];if(!sh[j])return;
  if(sh[j].distSrc==="manual")return; // 用户手动覆盖,不自动改
  const gps=ydBetween(prevPos(i,j),sh[j].pos);
  if(gps!=null){sh[j].dist=gps;sh[j].distSrc="gps";return;}
  const prevRem=j===0?((p&&p.hole)||null):(sh[j-1]&&sh[j-1].rem!=null?sh[j-1].rem:null);
  sh[j].dist=(prevRem!=null&&sh[j].rem!=null)?prevRem-sh[j].rem:null;
  sh[j].distSrc=sh[j].dist!=null?"rem":null;
}

/* ===== 卫星图轨迹复盘(Esri World Imagery,免费无 key;Leaflet 按需从 CDN 加载) ===== */
let _leafletLoading=null,_trackState=null;
function loadLeaflet(){
  if(window.L)return Promise.resolve();
  if(_leafletLoading)return _leafletLoading;
  _leafletLoading=new Promise((res,rej)=>{
    const css=document.createElement("link");css.rel="stylesheet";css.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";document.head.appendChild(css);
    const js=document.createElement("script");js.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    js.onload=()=>res();js.onerror=()=>{_leafletLoading=null;rej(new Error("地图库加载失败,需联网后重试。"));};document.head.appendChild(js);
  });
  return _leafletLoading;
}
function collectTrackHoles(rd){
  return rd.holes.map(h=>{
    const pts=[];
    if(h.tee&&h.tee.lat!=null)pts.push({pos:h.tee,label:"发球台",no:0});
    (h.shots||[]).forEach((s,j)=>{if(s.pos&&s.pos.lat!=null){
      const res=s.result?(RESULTS.find(r=>r.k===s.result)||{}).t||"":"";
      pts.push({pos:s.pos,label:`${s.club||("第"+(j+1)+"杆")}${res?" · "+res:""}`,no:j+1});
    }});
    return{no:h.no,par:h.par,pts};
  }).filter(h=>h.pts.length>0);
}
/* 卫星图瓦片源:默认用 config.js 里的 Mapbox public token(高清);用户也可在地图「换高清」里
   填自己的 token 覆盖(存 localStorage)。config.js 没配 token 时回退到免费 Esri。 */
const DEFAULT_MAPBOX_TOKEN=((window.APP_CONFIG&&window.APP_CONFIG.MAPBOX_TOKEN)||"").trim();
function getMapboxToken(){return (localStorage.getItem('golf:mapboxToken')||DEFAULT_MAPBOX_TOKEN).trim();}
function setMapboxToken(){
  const cur=getMapboxToken();
  const v=prompt("粘贴 Mapbox public token(pk. 开头)换高清卫星图。\n留空并确定 = 清除、用回 Esri。\ntoken 在 account.mapbox.com 拿。",cur);
  if(v===null)return;
  const t=v.trim();
  if(t&&!t.startsWith('pk.')){alert("不像 Mapbox public token(应以 pk. 开头),没保存。");return;}
  if(t)localStorage.setItem('golf:mapboxToken',t);else localStorage.removeItem('golf:mapboxToken');
  const rid=_trackState?_trackState.roundId:null;
  if(rid!=null){closeTrackMap();openTrackMap(rid);}
  else alert(t?"✅ 已保存,下次看轨迹用 Mapbox 高清。":"已清除,用回 Esri。");
}
function mapTileLayer(){
  const tk=getMapboxToken();
  if(tk)return L.tileLayer(`https://api.mapbox.com/styles/v1/mapbox/satellite-v9/tiles/256/{z}/{x}/{y}@2x?access_token=${tk}`,{maxZoom:22,attribution:"© Mapbox © Maxar"});
  return L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:21,maxNativeZoom:19,attribution:"Tiles © Esri"});
}
async function openTrackMap(roundId){
  const rd=(R&&R.id===roundId)?R:rounds.find(r=>r.id===roundId);
  if(!rd){alert("找不到这场记录。");return;}
  const holesPts=collectTrackHoles(rd);
  if(!holesPts.length){alert("这场没有任何 GPS 打点,画不了轨迹。\n打球时点「📍发球台 / 📍球位」才会记录位置。");return;}
  showOverlay("加载卫星地图…");
  try{await loadLeaflet();}catch(e){hideOverlay();alert(e.message);return;}
  hideOverlay();
  let box=document.getElementById("trackMap");
  if(!box){box=document.createElement("div");box.id="trackMap";box.style.cssText="position:fixed;inset:0;z-index:9999;background:#000;";document.body.appendChild(box);}
  box.innerHTML=`<div style="position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(20,28,22,.92);color:#fff;">
    <button onclick="closeTrackMap()" style="background:none;border:1.5px solid #fff;color:#fff;border-radius:6px;padding:5px 12px;font-size:14px;cursor:pointer;">← 返回</button>
    <span style="font-weight:700;font-size:14px;">🛰 ${esc(rd.courseName||"球场")} 轨迹</span>
    <button onclick="setMapboxToken()" title="填 Mapbox token 换高清卫星图" style="background:none;border:1px solid #fff;color:#fff;border-radius:5px;padding:4px 9px;font-size:12px;cursor:pointer;">${getMapboxToken()?"高清 ✓":"换高清"}</button>
    <select id="trackHoleSel" onchange="trackFocusHole(this.value)" style="margin-left:auto;padding:5px 8px;border-radius:5px;border:none;font-size:13px;">
      <option value="all">全场</option>${holesPts.map(h=>`<option value="${h.no}">第${h.no}洞(${h.pts.length}点)</option>`).join("")}</select>
  </div><div id="trackMapCanvas" style="position:absolute;inset:0;"></div>`;
  const map=L.map("trackMapCanvas",{zoomControl:true,attributionControl:true});
  mapTileLayer().addTo(map);
  _trackState={map,holesPts,roundId};
  const colors=["#FFD166","#06D6A0","#EF476F","#118AB2","#F78C6B","#C77DFF"];
  const all=[];
  holesPts.forEach((h,hi)=>{
    const latlngs=h.pts.map(p=>[p.pos.lat,p.pos.lng]);all.push(...latlngs);
    const col=colors[hi%colors.length];
    if(latlngs.length>1)L.polyline(latlngs,{color:col,weight:3,opacity:.9}).addTo(map);
    h.pts.forEach(p=>{
      L.circleMarker([p.pos.lat,p.pos.lng],{radius:p.no===0?7:6,color:"#fff",weight:2,fillColor:p.no===0?"#2E7D46":col,fillOpacity:1})
        .addTo(map).bindPopup(`<b>第${h.no}洞</b> · ${esc(p.label)}${p.pos.acc?` <span style="opacity:.6">±${p.pos.acc}m</span>`:""}`);
    });
  });
  if(all.length)map.fitBounds(all,{padding:[45,45]});
}
function trackFocusHole(v){
  const st=_trackState;if(!st)return;
  if(v==="all"){const all=[];st.holesPts.forEach(h=>h.pts.forEach(p=>all.push([p.pos.lat,p.pos.lng])));if(all.length)st.map.fitBounds(all,{padding:[45,45]});return;}
  const h=st.holesPts.find(x=>String(x.no)===String(v));if(!h)return;
  const ll=h.pts.map(p=>[p.pos.lat,p.pos.lng]);
  if(ll.length===1)st.map.setView(ll[0],18);else if(ll.length)st.map.fitBounds(ll,{padding:[60,60]});
}

function holeStats(h){
  if(h.quick){const firElig=h.par>3;return{score:+h.score||0,pen:0,gir:h.gir===true,fir:firElig&&h.fir===true,firElig,putts:+h.putts||0,chips:+h.chips||0,scrOpp:false,scrOk:false,sandOpp:false,sandOk:false,played:(+h.score||0)>0};}
  const pen=h.shots.filter(s=>s.result==="water"||s.result==="ob").length;const score=h.shots.length+pen+h.putts;
  let reach=null,acc=0;for(const s of h.shots){acc++;if(s.result==="water"||s.result==="ob")acc++;if(s.result==="green"){reach=acc;break;}}
  const gir=reach!==null&&reach<=h.par-2,fir=h.par>3&&h.shots[0]&&h.shots[0].result==="fairway",firElig=h.par>3,onGreen=h.shots.some(s=>s.result==="green");
  const scrOpp=onGreen&&!gir,scrOk=scrOpp&&score<=h.par,sandOpp=h.shots.some(s=>s.result==="gbunker"),sandOk=sandOpp&&score<=h.par;
  return{score,pen,gir,fir,firElig,putts:h.putts,chips:0,scrOpp,scrOk,sandOpp,sandOk,played:h.shots.length>0};}

/* ===== DISPERSION / TENDENCY ===== */
function allShots(){const rs=[...roundsForStats()];if(R&&(statsFilter==="all"||statsFilter==="match"))rs.push(R);const out=[];
  rs.forEach(rd=>(rd.holes||[]).forEach(h=>(h.shots||[]).forEach((s,j)=>out.push({...s,par:h.par,idx:j}))));return out;}
function allShotsRaw(){const rs=[...rounds];if(R)rs.push(R);const out=[];rs.forEach(rd=>(rd.holes||[]).forEach(h=>(h.shots||[]).forEach(s=>out.push(s))));return out;}
function topResLabel(res){const e=Object.entries(res||{}).sort((a,b)=>b[1]-a[1])[0];if(!e)return"";return "("+((RESULTS.find(r=>r.k===e[0])||{}).t||e[0])+")";}
function clubHistoryAt(yards,tol){
  if(!yards||yards<=0)return[];
  tol=tol||Math.max(12,Math.round(yards*0.12));
  const by={};
  allShotsRaw().forEach(s=>{if(!s.club||!s.dist||Math.abs(s.dist-yards)>tol)return;
    const b=by[s.club]=by[s.club]||{club:s.club,n:0,sum:0,res:{}};b.n++;b.sum+=s.dist;if(s.result)b.res[s.result]=(b.res[s.result]||0)+1;});
  return Object.values(by).map(b=>({club:b.club,n:b.n,avg:Math.round(b.sum/b.n),res:b.res})).sort((a,b)=>b.n-a.n);
}
function experienceForAI(){
  const out=[],seen=new Set();const push=t=>{if(t&&!seen.has(t)){seen.add(t);out.push(t);}};
  [...rounds,...(R?[R]:[])].forEach(rd=>{
    if(rd.notes)push(`[${rd.courseName||"某场"}·整场] ${rd.notes}`);
    (rd.holes||[]).forEach(h=>{
      if(h.note)push(`[${h.no}号Par${h.par}] ${h.note}`);
      (h.shots||[]).forEach(s=>{if(s.note){const dt=s.dist?` ${s.dist}码`:"";const rt=s.result?((RESULTS.find(r=>r.k===s.result)||{}).t||""):"";push(`[${h.no}号 ${s.club||""}${dt}${rt?" "+rt:""}] ${s.note}`);}});
    });
  });
  return out.slice(-50);
}
function clubTendency(club){const shots=allShots().filter(s=>s.club===club);
  const dirs=shots.filter(s=>nd(s.dir).length>0),cnt=t=>shots.filter(s=>nd(s.dir).includes(t)).length;
  const dist=shots.filter(s=>s.dist).map(s=>s.dist);
  const avg=dist.length?Math.round(dist.reduce((a,b)=>a+b,0)/dist.length):null;
  const spread=dist.length>1?Math.round((Math.max(...dist)-Math.min(...dist))/2):null;
  return{samples:shots.length,dirN:dirs.length,left:cnt("left")+cnt("fl"),right:cnt("right")+cnt("fr"),shortN:cnt("short"),longN:cnt("long"),onN:cnt("on"),avg,spread};}
function tendencyNote(club,par,pin){const t=clubTendency(club);if(t.dirN<4&&!(t.spread&&t.samples>=4))return null;
  const side=t.right>t.left*1.5?"偏右":t.left>t.right*1.5?"偏左":null;
  const lng=t.longN>t.shortN*1.5?"偏长":t.shortN>t.longN*1.5?"偏短":null;
  if(!side&&!lng&&!t.spread)return null;
  let s=`📈 ${club}`;const bits=[];
  if(side)bits.push(`${side}(${side==="偏右"?t.right:t.left}/${t.dirN})`);
  if(lng)bits.push(lng);
  if(t.spread)bits.push(`离散±${t.spread}码`);
  s+=" "+bits.join("、");const adv=[];
  if(side)adv.push(`瞄${side==="偏右"?"左":"右"}一点`);
  if(lng==="偏短")adv.push("宁可大半号");
  if(t.spread&&t.spread>=8)adv.push("攻果岭打中心、别冲边旗");
  if(adv.length)s+="；"+adv.join("，");return s;}

function buildStatsDigest(){
  const rs=[...roundsForStats()];if(R&&(statsFilter==="all"||statsFilter==="match"))rs.push(R);
  const played=rs.filter(rd=>rd.holes.some(h=>holeStats(h).played));
  const shots=allShots();
  if(!played.length&&!shots.length)return{hasData:false};
  let firM=0,firE=0,girM=0,girE=0,putts=0,holesPlayed=0,scrM=0,scrO=0,sandM=0,sandO=0,pen=0,chipsT=0;
  const agg={};
  rs.forEach(rd=>rd.holes.forEach(h=>{const st=holeStats(h);if(!st.played)return;holesPlayed++;chipsT+=st.chips||0;
    if(st.firElig){firE++;if(st.fir)firM++;}girE++;if(st.gir)girM++;putts+=st.putts;
    if(st.scrOpp){scrO++;if(st.scrOk)scrM++;}if(st.sandOpp){sandO++;if(st.sandOk)sandM++;}pen+=st.pen;
    const a=agg[h.no]=agg[h.no]||{sum:0,n:0,par:h.par};a.sum+=(st.score-h.par);a.n++;}));
  const harr=Object.entries(agg).map(([no,v])=>({no:+no,par:v.par,n:v.n,avg:+(v.sum/v.n).toFixed(2)}));
  const weak=[...harr].sort((a,b)=>b.avg-a.avg).slice(0,5);
  const strong=[...harr].sort((a,b)=>a.avg-b.avg).slice(0,5);
  const clubs=[...new Set(shots.filter(s=>s.club).map(s=>s.club))]
    .map(c=>{const t=clubTendency(c);return{club:c,samples:t.samples,avg:t.avg,spread:t.spread,left:t.left,right:t.right,shortN:t.shortN,longN:t.longN};})
    .filter(x=>x.samples>=2);
  const pf=(m,e)=>e?Math.round(m/e*100):null;
  return{hasData:true,rounds:played.length,holesPlayed,fir:pf(firM,firE),gir:pf(girM,girE),
    scrambling:pf(scrM,scrO),sandSave:pf(sandM,sandO),puttsPerHole:holesPlayed?+(putts/holesPlayed).toFixed(2):null,
    penalties:pen,chips:chipsT,chipsPerHole:holesPlayed?+(chipsT/holesPlayed).toFixed(2):null,weakHoles:weak,strongHoles:strong,clubs};
}

function renderDay(dd){

  if(dd.focus)s+=`<div class="day-focus"><b>本日重点</b>${esc(dd.focus)}</div>`;

/* 球童心法:情绪层(区别于 liveSuggest 的战术提示)——坏结果自动安抚 + 口袋卡 mantra。话术来自真实运动心理/球童资料,见 docs 话术库。 */
const CADDIE_TALK={
  bad:["甩掉它,后面还长","这洞翻篇了,就看下一杆","别担心,你能找回来","一杆定义不了你,你的反应才定义你"],
  ez:"给自己几步路的情绪——想懊恼就懊恼,走到球前就翻篇,回到你的流程。",
  mantra:["照我的流程做就够了","只打眼前这一杆","不管刚才怎样,每杆同一个流程","冷静+好奇:这球位和风要我怎么打?","我要打个果断的挥杆","这一杆我能打"]
};
function caddieMindHTML(i){
  const rh=R?R.holes[i]:null,shots=rh?rh.shots:[];
  const hadBad=shots.some(s=>{const r=RESULTS.find(x=>x.k===s.result);return r&&r.g==="bad";});
  const ms=[0,1,2].map(k=>CADDIE_TALK.mantra[(i+k)%CADDIE_TALK.mantra.length]);
  let inner="";
  if(hadBad){const bl=CADDIE_TALK.bad[i%CADDIE_TALK.bad.length];
    inner+=`<div class="cm-bad">「${bl}」<div class="cm-ez">${CADDIE_TALK.ez}</div></div>`;}
  inner+=`<div class="cm-mh">口袋卡 · 站球后默念一句</div>`+ms.map(m=>`<div class="cm-m">「${m}」</div>`).join("");
  return `<details class="cm"${hadBad?" open":""}><summary>🧠 球童心法${hadBad?" · 先稳住,翻篇":""}</summary><div class="cm-bd">${inner}</div></details>`;
}

function dispersionPanel(){const clubs=[...new Set(allShots().filter(s=>s.club).map(s=>s.club))];
  const rows=clubs.map(c=>({c,t:clubTendency(c)})).filter(r=>r.t.dirN>=2||r.t.spread!=null).sort((a,b)=>b.t.samples-a.t.samples);

      {time:'0–15 分钟',icon:'🌡️',c:'#8a9a8c',title:'校准速度',steps:[
        '随便推5个长推（30步以上），感受今晚果岭速度',
        '不求进洞，求全部停在1步内',
        '心里记下：今晚果岭快还是慢？']},
      {time:'15–50 分钟',icon:'🎯',c:'var(--flag)',title:'短推 · 比赛最关键的杆',steps:[
        '定3步（9英尺）：打10球，目标8/10进',
        '进了8个以上：试左坡、右坡各5球',
        '进了6个以下：退到2步，先建信心',
        p3tip,
        '压力收官：连续进5个才算通关（不然重来）']},
      {time:'50–80 分钟',icon:'📏',c:'var(--wind)',title:'中距离速度控制',steps:[
        '15步：10球，全部停旗2步内（不求进）',
        '25步：5球，lag推——求停1.5步内',
        midTip,
        '每5球停：偏哪方向？调整站位或发力节奏']},
      {time:'80–100 分钟',icon:'🧠',c:'#b07040',title:'果岭阅读练习',steps:[
        '找4条不同坡向的推线（上坡/下坡/左坡/右坡）',
        '每条推5球：先站后面看坡向，再走上去推',
        '上坡推死一点；下坡推轻，先确保不过洞',
        '记住今晚最难的坡向——比赛时那里优先打安全落点']},
      {time:'100–120 分钟',icon:'🏆',c:'var(--green-2)',title:'比赛压力模拟',steps:[
        '场景：比赛最后3洞保par，每个3步推杆当作决定性一推',
        '进了继续；没进从头计数',
        '目标：连续进5个，才算今晚合格',
        '最后3球：随意推，带着成功感觉离场']}]);
  }else if(S.trainDay==='sat'){
    title='☀️ 周六 · 比赛准备 半天（约4小时）';
    tip='周六重点是建立比赛感：每一杆站好对准再打。追感觉，不追数字。';
    const par3Desc=par3s.map(h=>'第'+h.no+'洞'+h.yd+'码('+cf(h.yd)+')').join('、');
    const apprDesc=appr.slice(0,3).map(h=>'第'+h.no+'洞约'+h.d+'码('+cf(h.d)+')').join('、');
    const bc=badClubs[0];
    const bcTip=bc?(bc.t.right>bc.t.left*1.5?'注意 '+bc.c+' 偏右，练时瞄左半球宽':bc.t.left>bc.t.right*1.5?'注意 '+bc.c+' 偏左，练时瞄右半球宽':''):'';
    const h17yd=h17?h17.yards[S.tee]:270;
    if(girP!==null||firP!==null)body+='<div style="background:var(--paper-2);border-radius:4px;padding:10px 12px;margin-bottom:14px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;">本周数据</div>'+(girP!==null?'<div class="small">· GIR '+girP+'% '+(girP<30?'⚠ 攻果岭是首要问题':'✓ 继续保持')+'</div>':'')+(firP!==null?'<div class="small">· FIR '+firP+'% '+(firP<40?'⚠ 开球精度需提升':'✓ 开球不错')+'</div>':'')+'</div>';
    body+=blk([
      {time:'0–20 分钟',icon:'🌡️',c:'#8a9a8c',title:'热身 + 找状态',steps:[
        'SW/GW/9i/7i 各5球，半挥杆到全力',
        '记住：今天哪支杆感觉最顺？比赛留着用',
        '不要追距离，追节奏感']},
      {time:'20–70 分钟',icon:'🎯',c:'var(--green-2)',title:'攻果岭模拟 · 球场实际距离',steps:[
        par3Desc?'Par3必练（'+par3Desc+'）各10球，瞄旗中心':'',
        apprDesc?'Par4进攻距离（'+apprDesc+'）各10球':'铁杆各距离各10球',
        '策略重点：不冲边旗（上绿后长推比冲边旗更伤成绩）',
        bcTip]},
      {time:'70–100 分钟',icon:'✈️',c:'var(--flag)',title:'开球可控性',steps:[
        '3W/5W各10球：找球道，不追距离',
        'Driver 15球：追落地角，保安全区',
        h17yd?'第17洞'+h17yd+'码Par4短洞：专门试3W能否冲绿，找到今天最大安全距离':'']},
      {time:'100–125 分钟',icon:'✂️',c:'#b07040',title:'Wedge区间 · 比赛关键距离',steps:[
        '80–100码：GW/SW各10球，落点要一致',
        '100–120码：PW 10球，追同一落点区域',
        'Par5第三杆或短Par4第二杆常是这个距离，攒手感']},
      {time:'125–150 分钟',icon:'🏖️',c:'var(--wind)',title:'推杆压力训练',steps:[
        '5步短推：连续进5个才算合格',
        '15步中距10球：停旗2步内',
        '想象每次推杆都是比赛保par的一推']},
      {time:'150–185 分钟',icon:'🏌️',c:'var(--green)',title:'前9洞模拟收尾',steps:[
        '在练习场按前9洞顺序想象打（不用换位置）',
        '每杆站好对准再打，模拟比赛节奏',
        '记录：攻果岭哪支杆今天感觉最准？明天用它']}]);
  }else{
    title='🏆 周日 · 全天备赛';
    tip='周日核心：每杆站好想好再打，技术问题留给平时。今天只想打好每一杆。';
    body+=blk([
      {time:'赛前 40 分钟',icon:'🌡️',c:'#8a9a8c',title:'赛前热身常规',steps:[
        '推杆10分钟：感受速度，不练技术',
        'SW/GW/7i 各5球：找节奏，不追数字',
        'Driver 5球：热开关节，不追距离',
        '最后：连推进3个3步短推，带信心上场']},
      {time:'上午（若无比赛）',icon:'🎯',c:'var(--green-2)',title:'全面技术练习',steps:[
        '热身20分钟',
        par3s.length?'Par3必练：'+par3s.map(h=>'第'+h.no+'洞'+h.yd+'码('+cf(h.yd)+')').join('、')+' 各15球':'Par3各距离各15球',
        '铁杆从短到长，每个距离15球，记落点分布',
        girP!==null?'GIR '+girP+'%'+(girP<30?' ⚠ 今天重点攻果岭':'，继续保持攻果岭准度'):'攻果岭全程瞄中心']},
      {time:'下午（打球时段）',icon:'🏌️',c:'var(--green)',title:'18洞实战 / 全场模拟',steps:[
        '打实际18洞，每洞参照策略手册选杆',
        '开球：按策略选杆，不追距离，找球道',
        '推杆：每次推前读绿线，不凭感觉瞎推',
        '比赛心态：每洞只想这洞，打完再想下洞']},
      {time:'结束后 30 分钟',icon:'📝',c:'var(--wind)',title:'存档 + 复盘',steps:[
        '把今天数据存入App（推杆数、落点方向）',
        '找最多失分的3洞：开球、进攻还是推杆的问题？',
        '找今天最好的3杆：下周训练从这里出发',
        '下周训练重点：根据今天数据自动更新']}]);
  }
  html+='<section class="card" style="margin-top:12px;"><div class="card-head"><h2>'+title+'</h2></div><div class="card-body">'+body+'<p class="small" style="color:var(--ink-soft);margin-top:10px;">💡 '+tip+'</p></div></section>';
  if(badClubs.length){
    html+='<section class="card" style="margin-top:0;"><div class="card-head"><h2>今日球杆提示</h2></div><div class="card-body">';
    badClubs.slice(0,4).forEach(function(x){const tips=[];const c=x.c,t=x.t;
      if(t.right>t.left*1.5)tips.push('偏右('+t.right+'/'+t.dirN+'次) → 练时瞄左半球宽');
      if(t.left>t.right*1.5)tips.push('偏左('+t.left+'/'+t.dirN+'次) → 练时瞄右半球宽');
      if(t.shortN>t.longN*1.5)tips.push('偏短 → 考虑大半号或加力');
      if(t.spread>=10)tips.push('离散±'+t.spread+'码 → 主练稳定性，不追距离');
      if(!tips.length)return;
      html+='<div style="padding:8px 0;border-bottom:1px solid var(--rule);"><b>'+c+'</b><span class="small" style="margin-left:6px;">'+(t.avg?'均'+t.avg+'码 · ':'')+t.samples+'杆</span><div class="small" style="margin-top:4px;">'+tips.join('；')+'</div></div>';});
    html+='</div></section>';}
  html+='<p class="footnote">弱项和球杆提示根据数据自动更新。打完一轮先存档再来看。</p>';
  w.innerHTML=html;}

loadAll();

(function(){const vt=document.getElementById("verTag");if(vt)vt.textContent=(APP_VERSION.indexOf("__")>=0?"dev":APP_VERSION);})();
if("serviceWorker" in navigator){
  let _swRefreshing=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{if(_swRefreshing)return;_swRefreshing=true;location.reload();});
  navigator.serviceWorker.register("/sw.js").then(reg=>{
    reg.update();                                   // 每次打开即检查新版
    setInterval(()=>reg.update(),30*60*1000);       // 之后每 30 分钟再查一次
  }).catch(()=>{});
}
