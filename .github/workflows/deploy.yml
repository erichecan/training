name: Deploy to Cloud Run

on:
  push:
    branches: ["main"]
    paths:
      - "public/**"
      - "server.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: supply-491510
      REGION: us-central1
      SERVICE_NAME: yardage-caddie
      IMAGE: us-central1-docker.pkg.dev/supply-491510/yardage-caddie/app:latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=0.5 \
            --memory=256Mi \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --quiet

      - name: Verify
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "✅ Deployed: $URL"
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" "$URL"
